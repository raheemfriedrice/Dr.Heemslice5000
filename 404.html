<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | SnackMaster RICE</title>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --clr-bg:     #080808;
      --clr-accent: #ff6b00;
      --clr-white:  #f0f0f0;
      --clr-muted:  #888;
      --clr-border: #222;
    }

    body {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--clr-bg);
      color: var(--clr-white);
      font-family: 'Inter', -apple-system, sans-serif;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* Bottom glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 40% at 50% 110%, rgba(255,107,0,0.1), transparent 70%);
      pointer-events: none;
    }

    .error-content { position: relative; z-index: 1; }

    .error-code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(8rem, 25vw, 20rem);
      line-height: 0.85;
      -webkit-text-stroke: 2px var(--clr-accent);
      color: transparent;
      opacity: 0.25;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -55%);
      z-index: 0;
      user-select: none;
    }

    .error-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--clr-accent);
      margin-bottom: 1.5rem;
    }

    .error-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      line-height: 0.95;
      margin-bottom: 1.5rem;
    }

    .error-sub {
      font-size: 1rem;
      color: var(--clr-muted);
      max-width: 36ch;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 4px;
      text-decoration: none;
      background: var(--clr-accent);
      color: var(--clr-white);
      border: 2px solid var(--clr-accent);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .error-btn:hover {
      background: transparent;
      color: var(--clr-accent);
    }

    .error-footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--clr-border);
    }

    /* Glitch flicker on the 404 background */
    @keyframes glitch {
      0%, 90%, 100% { opacity: 0.25; transform: translate(-50%, -55%); }
      92% { opacity: 0.4; transform: translate(-48%, -55%); }
      94% { opacity: 0.15; transform: translate(-52%, -56%); }
      96% { opacity: 0.35; transform: translate(-50%, -54%); }
    }

    .error-code {
      animation: glitch 4s steps(1) infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .error-code { animation: none; }
    }
  </style>
</head>
<body>
  <span class="error-code" aria-hidden="true">404</span>

  <div class="error-content">
    <p class="error-label">Page Not Found</p>
    <h1 class="error-title">Wrong<br/>Frequency.</h1>
    <p class="error-sub">
      Whatever you're looking for isn't here.
      But the rest of the signal is still live.
    </p>
    <a href="/Dr.Heemslice5000/" class="error-btn">&larr; Back to Home</a>
  </div>

  <p class="error-footer">SnackMaster RICE &bull; Dr. Heemslice 5000</p>
</body>
</html>
